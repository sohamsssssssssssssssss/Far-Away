# Live shadow season — predict on the real USGS feed, act on nothing, accumulate
# a tamper-evident track record. Runs on a schedule, journals new earthquakes,
# settles outcomes after a grace window, and commits the growing journal back.
#
# This is the decisive validation step in motion: the model predicts live on data
# it has never seen, the hash-chained journal forbids post-hoc curation, and the
# scorecard (make shadow-score) is computed against reality as outcomes accrue.
name: shadow-season

on:
  schedule:
    # 06:17 UTC daily (off the hour to avoid GitHub's cron congestion).
    - cron: "17 6 * * *"
  workflow_dispatch: {}

# The job commits the updated journal back to the repo.
permissions:
  contents: write

concurrency:
  group: shadow-season
  cancel-in-progress: false

jobs:
  shadow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (stdlib-only core)
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Tick + resolve against the live USGS feed
        # tick journals new M4.5+ events; resolve attaches real outcomes for
        # predictions past the 2-day settle window. Network failures degrade
        # gracefully (logged, exit 0) — a missed day never corrupts the journal.
        run: |
          python -m disastermind.live.usgs_shadow \
            --journal shadow/usgs_season.jsonl --mode both

      - name: Verify chain integrity
        run: |
          python -m disastermind.ml.shadow_season \
            --journal shadow/usgs_season.jsonl verify

      - name: Commit the updated journal
        run: |
          if git diff --quiet -- shadow/usgs_season.jsonl; then
            echo "No new predictions or outcomes today."
            exit 0
          fi
          git config user.name  "disastermind-shadow[bot]"
          git config user.email "shadow-bot@users.noreply.github.com"
          git add shadow/usgs_season.jsonl
          n_pred=$(grep -c '"kind":"prediction"' shadow/usgs_season.jsonl || true)
          n_out=$(grep -c '"kind":"outcome"' shadow/usgs_season.jsonl || true)
          git commit -m "shadow: update live USGS season (predictions=${n_pred}, outcomes=${n_out})"
          git push
