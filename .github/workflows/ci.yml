# DisasterMind continuous integration (PRD Group A, Step 10 — productionisation).
#
# The project lives at the repository root (``disastermind/`` is the Python
# package, ``tests/`` the suite, ``clients/web/`` the frontend), so every job runs
# from the root with no working-directory prefix.
#
# The runtime + test-suite are standard-library only (offline, no network, no
# heavy optional deps), so CI installs the package with the dev extras and runs
# pytest across the supported interpreter matrix (pyproject requires-python >=3.11).
# The clients/ and tests/integration/ trees are owned by other workstreams and are
# explicitly ignored here.
#
# Quality gates layered on top of the test matrix + docker build:
#   * test       — pytest matrix with an ENFORCED 83% coverage floor.
#   * lint       — ruff check (fast, deterministic style/correctness lint).
#   * typecheck  — mypy BLOCKING on the safety-critical core (contracts,
#                  commander matrix, evacuation, alerting, eval metrics) and
#                  advisory on the rest; expand the blocking set as it cleans up.
#   * security   — Trivy fs + image scan and pip-audit (informational), plus a
#                  BLOCKING CVE policy gate that fails on a fixable CRITICAL image vuln.
#   * sbom       — CycloneDX software bill-of-materials, uploaded as an artefact.
name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests (coverage-gated)
        # The clients/ and tests/integration/ trees belong to other workstreams.
        # Coverage floor is an ENFORCED gate: the suite measured 86% — 83% leaves
        # headroom for minor cross-interpreter variance while blocking regressions.
        run: >-
          python -m pytest -q --ignore=tests/integration --ignore=clients
          --cov=disastermind --cov-report=term-missing --cov-fail-under=83

  reproduce:
    name: reproduce (validation numbers)
    runs-on: ubuntu-latest
    # Regenerate every published headline metric from the committed real-data
    # fixtures and fail if any drifts from docs/validation_golden.json. This makes
    # the paper's numbers a continuously-verified artefact, not a static claim.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (stdlib-only core)
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: make reproduce
        run: python tools/reproduce.py

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install lint extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[lint]

      - name: ruff check
        # Lint the package and tests; config lives in pyproject.toml / .ruff.toml.
        run: ruff check .

  typecheck:
    name: typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install lint extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[lint]

      - name: mypy (type-clean packages — BLOCKING)
        # The gated set lives in the Makefile (MYPY_GATED) as the single source of
        # truth, so `make typecheck` runs the same gate locally and in CI. It now
        # spans 24 packages / ~97 files proven type-clean — the consequential core
        # (contracts, commander matrix, evacuation, alerting, eval metrics) plus
        # the prediction/cascade/resource/field tiers, orchestration, persistence,
        # federation, and more. Regressing any of them blocks the merge.
        run: make typecheck

      - name: mypy (full tree — advisory)
        # The remaining surface is gradually typed; report it without blocking,
        # and grow MYPY_GATED in the Makefile as packages reach zero errors.
        continue-on-error: true
        run: make typecheck-advisory

  security:
    name: security (trivy + pip-audit)
    runs-on: ubuntu-latest
    needs: test
    # The broad HIGH+CRITICAL scans below are informational (continue-on-error):
    # they print the full report and never block on noisy/un-fixable transitive
    # advisories. The ENFORCING gate is the final step — fixable CRITICALs in the
    # image fail the build (SECURITY.md gap #8: an actual CVE policy gate, not just
    # a generated report). Verified green against python:3.13-slim-bookworm.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + audit tool
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pip-audit

      - name: pip-audit (dependency vulnerabilities)
        continue-on-error: true
        run: pip-audit --progress-spinner off || true

      - name: Build image for scanning
        # Container scan needs an image; build the same one the docker job builds.
        run: docker build -t disastermind:scan .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true
        with:
          image-ref: disastermind:scan
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: CVE policy gate — fail on fixable CRITICAL (BLOCKING)
        # The enforced policy: a CRITICAL vulnerability with an available fix must
        # not ship in the image. `ignore-unfixed` keeps it actionable (no failing
        # on advisories nobody can patch yet); bump the base image / package to
        # clear it. This is the gate SECURITY.md gap #8 called for.
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: disastermind:scan
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL
          exit-code: "1"

  sbom:
    name: sbom (cyclonedx)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + CycloneDX
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install cyclonedx-bom

      - name: Generate CycloneDX SBOM
        # Produce a machine-readable bill of materials of the installed env.
        run: cyclonedx-py environment --output-format JSON -o sbom.cdx.json

      - name: Upload SBOM artefact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: warn

  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: disastermind:ci

      - name: Smoke-test the image (offline scenario, stdlib-only)
        run: docker run --rm disastermind:ci python -m disastermind simulate B
