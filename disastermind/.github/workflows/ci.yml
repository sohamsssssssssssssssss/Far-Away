# DisasterMind continuous integration (PRD Group A, Step 10 — productionisation).
#
# The runtime + test-suite are standard-library only (offline, no network, no
# heavy optional deps), so CI just installs the package with the dev extras and
# runs pytest across the supported interpreter matrix (pyproject requires-python
# is >=3.11).
name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        run: python -m pytest -q

  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t disastermind:ci .

      - name: Smoke-test the image (offline scenario)
        run: docker run --rm disastermind:ci simulate B
